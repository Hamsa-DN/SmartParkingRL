name: Smart Parking RL Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Training
      run: |
        python train.py